<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kommo KPIs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #e8e3db 0%, #d4cec3 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      color: #6b6456;
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(107, 100, 86, 0.08);
      border: 1px solid rgba(212, 206, 195, 0.3);
    }

    .card-title {
      font-size: 0.875rem;
      color: #8a8276;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .card-value {
      font-size: 2.25rem;
      color: #6b6456;
      font-weight: 700;
      line-height: 1;
    }

    .chart-card {
      grid-column: 1 / -1;
      padding: 2rem;
    }

    .chart-wrapper {
      position: relative;
      height: 320px;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .card {
        padding: 1.25rem;
      }

      .chart-card {
        padding: 1.5rem;
      }

      .chart-wrapper {
        height: 280px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <h1>KPIs Kommo</h1>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-title">Total Leads</div>
        <div class="card-value" id="total">0</div>
      </div>

      <div class="card chart-card">
        <div class="card-title">Leads por Asesor</div>
        <div class="chart-wrapper">
          <canvas id="chartAssignee"></canvas>
        </div>
      </div>

      <div class="card chart-card">
        <div class="card-title">Distribución por Estado</div>
        <div class="chart-wrapper">
          <canvas id="chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let chart;
    let chartAssignee;

    async function loadData() {
      try {
        const res = await fetch("https://kpi-tau-five.vercel.app/api/kpis");
        const data = await res.json();

        document.getElementById("total").innerText = data.totalLeads;

        // ---------------- STATUS CHART ----------------
        const ctx = document.getElementById("chart");

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
          type: "bar",
          data: {
            labels: Object.keys(data.byStatus),
            datasets: [{
              label: "Leads por estado",
              data: Object.values(data.byStatus),
              backgroundColor: 'rgba(138, 130, 118, 0.6)',
              borderColor: 'rgba(107, 100, 86, 0.8)',
              borderWidth: 1,
              borderRadius: 6
            }]
          }
        });

        // ---------------- ASSIGNEE CHART ----------------
        const ctx2 = document.getElementById("chartAssignee");

        if (chartAssignee) chartAssignee.destroy();

        chartAssignee = new Chart(ctx2, {
          type: "bar",
          data: {
            labels: Object.keys(data.byAssignee || {}),
            datasets: [{
              label: "Leads por asesor",
              data: Object.values(data.byAssignee || {}),
              backgroundColor: "rgba(107, 100, 86, 0.6)"
            }]
          }
        });

      } catch (error) {
        console.error('Error cargando datos:', error);
      }
    }

    loadData();
    setInterval(loadData, 600000);
  </script>

</body>

</html>
